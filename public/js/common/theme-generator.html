<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theme Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d0d;
      color: #e2e2e2;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #a78bfa;
      margin-bottom: 0.375rem;
    }

    p.subtitle {
      font-size: 0.8rem;
      color: #555;
      margin-bottom: 1.5rem;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    button {
      padding: 0.45rem 1.1rem;
      border: 1px solid #a78bfa;
      border-radius: 6px;
      background: transparent;
      color: #a78bfa;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    button:hover  { background: #a78bfa; color: #0d0d0d; }
    button.copied { background: #22c55e; border-color: #22c55e; color: #0d0d0d; }

    #output {
      width: 100%;
      height: calc(100vh - 9rem);
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #d4d4d4;
      font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 0.8rem;
      line-height: 1.6;
      padding: 1.25rem;
      resize: none;
      outline: none;
    }

    #output:focus { border-color: #a78bfa55; }
  </style>
</head>
<body>

  <h1>Theme Generator</h1>
  <p class="subtitle">Edit THEMES in theme-generator.js, then refresh. Copy output and paste into your CSS file.</p>

  <div class="toolbar">
    <button id="copy-btn">Copy All</button>
  </div>

  <textarea id="output" readonly spellcheck="false"></textarea>

  <script>
    // Intercept console.log before loading the generator script
    const _origLog = console.log;
    const captured = [];
    console.log = function (...args) {
      captured.push(args.join(' '));
      _origLog.apply(console, args);
    };
  </script>

  <!-- Generator script runs here — console.log output is captured above -->
  <script src="theme-generator.js"></script>

  <script>
    // Restore console.log
    console.log = _origLog;

    // Display captured output
    document.getElementById('output').value = captured.join('\n');

    // Copy All button
    const btn = document.getElementById('copy-btn');
    btn.addEventListener('click', async () => {
      const text = document.getElementById('output').value;
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        // Fallback for file:// protocol
        const ta = document.getElementById('output');
        ta.select();
        document.execCommand('copy');
      }
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy All';
        btn.classList.remove('copied');
      }, 2000);
    });
  </script>

</body>
</html>
